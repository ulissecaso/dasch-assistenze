name: scraper-vamart

# Scarica automaticamente da Vamart due file, nella stessa sessione:
#  1. Il CSV delle sole "commissioni di assistenza" (filtro dedicato del
#     portale) -> rileva le pratiche aperte direttamente su Vamart e
#     chiude la fase "Creazione commissione di assistenza" quando trova
#     una pratica gia' in attesa da una segnalazione via mail.
#  2. Il CSV "Piano di Carico" (nessun filtro) -> fa avanzare le fasi
#     "Invio ordine ricambi", "Arrivo merce in deposito" (dopo conferma
#     ordine dell'operatore) e "Consegna materiale" in base allo stato di
#     ogni riga/articolo.
# Sostituisce il download/import manuale dal pannello admin.
#
# Frequenza: ogni ora durante l'orario lavorativo (8:00-18:00, Lun-Sab).
# Due blocchi di orario UTC per compensare il cambio ora legale/solare
# (l'Italia passa da CET a CEST e viceversa, GitHub Actions gira sempre in
# UTC e non si adegua da solo): non e' preciso al minuto sul cambio
# effettivo di marzo/ottobre, ma resta all'interno dell'orario lavorativo
# tutto l'anno.
#
# Richiede questi Repository secrets (Settings > Secrets and variables > Actions):
#   VAMART_URL                  URL della pagina di login di Vamart (Cinquegrana)
#   VAMART_URL_MASTERMOBILI     URL della pagina di login di Vamart (Master Mobili),
#                                oggi https://mastermobili20250616103641.azurewebsites.net/Account/Login
#   VAMART_URL_FEBAL            URL della pagina di login di Vamart (Febal), da impostare
#                                quando il brand Febal viene creato (vedi job in fondo)
#   VAMART_USER                 utente di login Vamart (condiviso, salvo dove specificato)
#   VAMART_PASS                 password di login Vamart (condivisa, salvo dove specificato)
#   SUPABASE_URL                stesso valore di SUPABASE_URL usato dall'app
#   SUPABASE_SERVICE_ROLE_KEY   service role key di Supabase (mai la anon key)
#
# Un job per brand, stesso codice: il modulo di importazione non cambia tra
# un brand e l'altro, cambiano solo l'URL Vamart e il BRAND_CODICE passato
# agli script di import (vedi scripts/import-csv/*.mjs). Se un brand avesse
# credenziali Vamart proprie (non condivise), basta aggiungere
# VAMART_USER_<CODICE> / VAMART_PASS_<CODICE> e usarli al posto di quelli
# condivisi nel job di quel brand.

on:
  schedule:
    # Apr-Ott (ora legale, CEST = UTC+2): 06-16 UTC = 08:00-18:00 locali
    - cron: "0 6-16 * 4-10 1-6"
    # Nov-Mar (ora solare, CET = UTC+1): 07-17 UTC = 08:00-18:00 locali
    - cron: "0 7-17 * 1-3,11-12 1-6"
  workflow_dispatch: {}      # permette anche l'avvio manuale da GitHub

jobs:
  scrape-e-importa-cinquegrana:
    runs-on: ubuntu-latest
    # importVamartCsv.mjs ora usa query in blocco/parallele (stessa tecnica
    # dell'upload manuale): dovrebbe completare in meno di un minuto anche
    # con ~2300 pratiche. 15 min di margine per download Vamart piu' lenti
    # del solito.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Installa dipendenze scraper
        working-directory: scraper
        run: npm install

      - name: Installa Chromium per Playwright
        working-directory: scraper
        run: npx playwright install --with-deps chromium

      - name: Scarica CSV commissioni di assistenza + Piano di Carico da Vamart
        working-directory: scraper
        env:
          GESTIONALE_URL: ${{ secrets.VAMART_URL }}
          GESTIONALE_USER: ${{ secrets.VAMART_USER }}
          GESTIONALE_PASS: ${{ secrets.VAMART_PASS }}
        run: npm run download

      - name: Installa dipendenze importatore
        working-directory: scripts/import-csv
        run: npm install

      - name: Importa commissioni di assistenza in Supabase
        working-directory: scripts/import-csv
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BRAND_CODICE: CINQUEGRANA
        run: node importCommissioniAssistenza.mjs ../../scraper/downloads/ultimo.csv

      - name: Importa Piano di Carico in Supabase (avanzamento fasi ordine/giacenza/consegna)
        working-directory: scripts/import-csv
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ORIGINE_IMPORT: scraper_automatico
          BRAND_CODICE: CINQUEGRANA
        run: node importVamartCsv.mjs ../../scraper/downloads/ultimo-piano-di-carico.csv

      - name: Carica CSV scaricati e screenshot di debug come artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ultimi-csv-vamart-cinquegrana
          path: |
            scraper/downloads/ultimo.csv
            scraper/downloads/ultimo-piano-di-carico.csv
            scraper/downloads/debug-*.png
          if-no-files-found: warn
          retention-days: 14

      - name: Notifica fallimento
        if: failure()
        run: |
          echo "::error::Scraping/import Vamart (Cinquegrana) fallito. Controllare il log (cambio password, layout portale, 2FA) e importare manualmente dal pannello admin nel frattempo."

  scrape-e-importa-mastermobili:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Installa dipendenze scraper
        working-directory: scraper
        run: npm install

      - name: Installa Chromium per Playwright
        working-directory: scraper
        run: npx playwright install --with-deps chromium

      - name: Scarica CSV commissioni di assistenza + Piano di Carico da Vamart
        working-directory: scraper
        env:
          GESTIONALE_URL: ${{ secrets.VAMART_URL_MASTERMOBILI }}
          GESTIONALE_USER: ${{ secrets.VAMART_USER }}
          GESTIONALE_PASS: ${{ secrets.VAMART_PASS }}
        run: npm run download

      - name: Installa dipendenze importatore
        working-directory: scripts/import-csv
        run: npm install

      - name: Importa commissioni di assistenza in Supabase
        working-directory: scripts/import-csv
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BRAND_CODICE: MASTERMOBILI
        run: node importCommissioniAssistenza.mjs ../../scraper/downloads/ultimo.csv

      - name: Importa Piano di Carico in Supabase (avanzamento fasi ordine/giacenza/consegna)
        working-directory: scripts/import-csv
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ORIGINE_IMPORT: scraper_automatico
          BRAND_CODICE: MASTERMOBILI
        run: node importVamartCsv.mjs ../../scraper/downloads/ultimo-piano-di-carico.csv

      - name: Carica CSV scaricati e screenshot di debug come artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ultimi-csv-vamart-mastermobili
          path: |
            scraper/downloads/ultimo.csv
            scraper/downloads/ultimo-piano-di-carico.csv
            scraper/downloads/debug-*.png
          if-no-files-found: warn
          retention-days: 14

      - name: Notifica fallimento
        if: failure()
        run: |
          echo "::error::Scraping/import Vamart (Master Mobili) fallito. Controllare il log (cambio password, layout portale, 2FA) e importare manualmente dal pannello admin nel frattempo."

  # Job per il brand Febal: richiede il secret VAMART_URL_FEBAL impostato
  # (Settings > Secrets and variables > Actions). NOTA: GitHub Actions non
  # permette di leggere "secrets" dentro un "if:" a livello di job (errore
  # "Unrecognized named-value: 'secrets'"), quindi qui - a differenza di
  # quanto si potrebbe pensare - il job gira sempre; se il secret non fosse
  # impostato fallirebbe al primo step con un errore di login su URL vuoto.
  scrape-e-importa-febal:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Installa dipendenze scraper
        working-directory: scraper
        run: npm install

      - name: Installa Chromium per Playwright
        working-directory: scraper
        run: npx playwright install --with-deps chromium

      - name: Scarica CSV commissioni di assistenza + Piano di Carico da Vamart
        working-directory: scraper
        env:
          GESTIONALE_URL: ${{ secrets.VAMART_URL_FEBAL }}
          GESTIONALE_USER: ${{ secrets.VAMART_USER }}
          GESTIONALE_PASS: ${{ secrets.VAMART_PASS }}
        run: npm run download

      - name: Installa dipendenze importatore
        working-directory: scripts/import-csv
        run: npm install

      - name: Importa commissioni di assistenza in Supabase
        working-directory: scripts/import-csv
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BRAND_CODICE: FEBAL
        run: node importCommissioniAssistenza.mjs ../../scraper/downloads/ultimo.csv

      - name: Importa Piano di Carico in Supabase (avanzamento fasi ordine/giacenza/consegna)
        working-directory: scripts/import-csv
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ORIGINE_IMPORT: scraper_automatico
          BRAND_CODICE: FEBAL
        run: node importVamartCsv.mjs ../../scraper/downloads/ultimo-piano-di-carico.csv

      - name: Carica CSV scaricati e screenshot di debug come artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ultimi-csv-vamart-febal
          path: |
            scraper/downloads/ultimo.csv
            scraper/downloads/ultimo-piano-di-carico.csv
            scraper/downloads/debug-*.png
          if-no-files-found: warn
          retention-days: 14

      - name: Notifica fallimento
        if: failure()
        run: |
          echo "::error::Scraping/import Vamart (Febal) fallito. Controllare il log (cambio password, layout portale, 2FA) e importare manualmente dal pannello admin nel frattempo."
